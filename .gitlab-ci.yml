---
image: "ruby:3.2"

variables:
  RAILS_ENV: test
  NO_ORACLE_ENHANCED: "true"
  NO_TINY_TDS: "true"
  CACHE_FALLBACK_KEY: "$CI_COMMIT_REF_SLUG"
  YARN_CACHE_FOLDER: "$CI_PROJECT_DIR/.yarn-cache"

before_script:
  # Setup Node.js
  - find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) -exec sed -i 's|http://deb.debian.org|https://deb.debian.org|g' {} +
  - apt-get update -qq
  - apt-get install --no-install-recommends -y curl ca-certificates gnupg
  - curl -fsSL https://deb.nodesource.com/setup_22.x -o nodesource_setup.sh
  - bash nodesource_setup.sh
  - apt-get install --no-install-recommends -y nodejs chromium chromium-driver openssh-client

  # Enable yarn
  - npm config set registry https://registry.npmmirror.com/ --global
  - corepack enable yarn
  - corepack prepare yarn@1.22.22 --activate
  - yarn config set registry https://registry.npmmirror.com/

  # Verify installations
  - node -v
  - yarn -v
  - ruby -v
  - which ruby

  # Setup Bundler
  - gem install bundler --no-document
  - bundle config set path 'vendor'  # Install dependencies into ./vendor/ruby
  - bundle install --jobs $(nproc)

  # Install JavaScript dependencies
  - yarn install --frozen-lockfile --cache-folder "$YARN_CACHE_FOLDER"

stages:
  - test
  - deploy

test:
  stage: test
  cache:
    - key:
        files:
          - Gemfile.lock
      paths:
        - vendor/ruby
    - key:
        files:
          - yarn.lock
      paths:
        - .yarn-cache/
  script:
    - cp config/database.yml.sample config/database.yml
    - export RAILS_MASTER_KEY=$PRODUCTION_MASTER_KEY
    - echo "$PRODUCTION_MASTER_KEY" > config/master.key
    - bin/rails db:drop RAILS_ENV=test
    - bin/rails db:setup RAILS_ENV=test
    - bin/rails test
    - bin/rails test:system
  only:
    - main
    - merge_requests

deploy_production:
  cache:
    - key:
        files:
          - Gemfile.lock
      paths:
        - vendor/ruby
  stage: deploy
  script:
    - bundle install -j $(nproc)
    - mkdir ~/.ssh
    - mv "$SSH_ID_RSA" ~/.ssh/id_rsa
    - mv "$SSH_CONFIG_FILE" ~/.ssh/config
    - bundle exec cap production deploy
  environment:
    name: production
    url: https://sso.thape.com.cn
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
